<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alvin Flow v3 (Draggable Nodes)</title>
  <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <style>
    body { background:#0b1020; color:#e5e7eb; font-family: Inter, system-ui, sans-serif; margin:0; padding:24px; }
    .card { max-width: 1600px; margin: 0 auto; background:#111827; border:1px solid #374151; border-radius:14px; padding:20px; }
    h1 { margin:0 0 8px; font-size: 24px; }
    p { margin:0 0 12px; color:#9ca3af; }
    .toolbar { display:flex; gap:8px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
    .toolbar button { background:#1f2937; border:1px solid #374151; color:#e5e7eb; border-radius:8px; padding:6px 10px; cursor:pointer; }
    .toolbar button:hover { background:#2b3648; }
    #network {
      height: 82vh;
      border:1px solid #334155;
      border-radius:10px;
      background-color: #0f172a;
      background-image:
        linear-gradient(rgba(148,163,184,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hint { opacity:.78; font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎮 Alvin System Flow v3</h1>
    <p>Draggable boxes + persistent arrows. Drag nodes freely; links stay connected.</p>

    <div class="toolbar">
      <button id="fitBtn">Fit View</button>
      <button id="layoutBtn">Auto Layout</button>
      <button id="lockBtn">Toggle Physics</button>
      <span class="hint">Drag nodes • Wheel zoom • Hold space + drag to pan</span>
    </div>

    <div id="network"></div>
  </div>

  <script>
    const nodes = new vis.DataSet([
      { id:'A', label:'📩 Message arrives', level:1, group:'lane' },
      { id:'B', label:'Parse metadata\n(channel/reply/history)', level:2, group:'lane' },
      { id:'C', label:'Intent extraction', level:3, group:'lane' },

      { id:'D', label:'Load SOUL.md', level:4, group:'identity' },
      { id:'E', label:'Load OPS.md', level:5, group:'identity' },
      { id:'F', label:'Apply constraints\n(boundaries/safety/style)', level:6, group:'identity' },

      { id:'G', label:'Memory needed?', level:7, group:'decision' },
      { id:'H', label:'memory_search', level:8, group:'memory' },
      { id:'I', label:'memory_get', level:9, group:'memory' },
      { id:'J', label:'Use verified snippets', level:10, group:'memory' },
      { id:'J0', label:'Skip recall', level:10, group:'memory' },

      { id:'K', label:'Skill match?', level:11, group:'decision' },
      { id:'L', label:'Read SKILL.md', level:12, group:'skill' },
      { id:'M', label:'Plan steps', level:13, group:'skill' },

      { id:'N', label:'Need tools?', level:14, group:'decision' },
      { id:'O', label:'Run tools\n(read/edit/write/exec/browser)', level:15, group:'exec' },
      { id:'P', label:'Validate state', level:16, group:'exec' },

      { id:'Q', label:'Compose response', level:17, group:'out' },
      { id:'R', label:'Format tone + structure', level:18, group:'out' },
      { id:'S', label:'Add XP footer', level:19, group:'out' },
      { id:'T', label:'Send reply', level:20, group:'out' },

      { id:'U', label:'Durable memory?', level:21, group:'decision' },
      { id:'V', label:'Append memory file', level:22, group:'log' },
      { id:'W', label:'End turn', level:23, group:'log' }
    ]);

    const edges = new vis.DataSet([
      { from:'A', to:'B', arrows:'to' },
      { from:'B', to:'C', arrows:'to' },
      { from:'C', to:'D', arrows:'to' },
      { from:'D', to:'E', arrows:'to' },
      { from:'E', to:'F', arrows:'to' },
      { from:'F', to:'G', arrows:'to' },
      { from:'G', to:'H', arrows:'to', label:'yes' },
      { from:'H', to:'I', arrows:'to' },
      { from:'I', to:'J', arrows:'to' },
      { from:'G', to:'J0', arrows:'to', label:'no' },
      { from:'J', to:'K', arrows:'to' },
      { from:'J0', to:'K', arrows:'to' },
      { from:'K', to:'L', arrows:'to', label:'yes' },
      { from:'K', to:'M', arrows:'to', label:'no' },
      { from:'L', to:'M', arrows:'to' },
      { from:'M', to:'N', arrows:'to' },
      { from:'N', to:'O', arrows:'to', label:'yes' },
      { from:'N', to:'P', arrows:'to', label:'no' },
      { from:'O', to:'P', arrows:'to' },
      { from:'P', to:'Q', arrows:'to' },
      { from:'Q', to:'R', arrows:'to' },
      { from:'R', to:'S', arrows:'to' },
      { from:'S', to:'T', arrows:'to' },
      { from:'T', to:'U', arrows:'to' },
      { from:'U', to:'V', arrows:'to', label:'yes' },
      { from:'U', to:'W', arrows:'to', label:'no' },
      { from:'V', to:'W', arrows:'to' }
    ]);

    const container = document.getElementById('network');
    const data = { nodes, edges };
    let physicsOn = false;

    const options = {
      layout: {
        hierarchical: {
          enabled: true,
          direction: 'LR',
          levelSeparation: 180,
          nodeSpacing: 120,
          treeSpacing: 180,
          sortMethod: 'directed'
        }
      },
      interaction: {
        dragNodes: true,
        dragView: true,
        zoomView: true,
        hover: true,
        navigationButtons: false,
        keyboard: true
      },
      physics: { enabled: physicsOn },
      nodes: {
        shape: 'box',
        margin: 12,
        widthConstraint: { maximum: 270 },
        font: { color:'#f8fafc', size:18, face:'Inter, system-ui, sans-serif', multi:'md' },
        borderWidth: 2,
        color: { background:'#1f2937', border:'#60a5fa', highlight:{ background:'#334155', border:'#93c5fd' } }
      },
      edges: {
        color: { color:'#94a3b8', highlight:'#cbd5e1' },
        smooth: { type:'cubicBezier', forceDirection:'horizontal', roundness:0.32 },
        arrows: { to: { enabled:true, scaleFactor:0.8 } },
        font: { color:'#cbd5e1', size:14, strokeWidth:0, align:'middle' }
      },
      groups: {
        lane:     { color:{ background:'#1f2937', border:'#60a5fa' } },
        identity: { color:{ background:'#172554', border:'#3b82f6' } },
        memory:   { color:{ background:'#052e16', border:'#22c55e' } },
        skill:    { color:{ background:'#3f1d2e', border:'#f472b6' } },
        exec:     { color:{ background:'#3f2d10', border:'#f59e0b' } },
        out:      { color:{ background:'#083344', border:'#22d3ee' } },
        log:      { color:{ background:'#312e81', border:'#818cf8' } },
        decision: {
          shape:'diamond',
          color:{ background:'#111827', border:'#f59e0b' },
          font:{ color:'#fef3c7', size:16, multi:'md' }
        }
      }
    };

    const network = new vis.Network(container, data, options);

    document.getElementById('fitBtn').addEventListener('click', () => network.fit({ animation:true }));
    document.getElementById('layoutBtn').addEventListener('click', () => {
      network.setOptions({ layout: { hierarchical: { enabled:true, direction:'LR', levelSeparation:180, nodeSpacing:120 } }, physics: { enabled:false } });
      network.stabilize(50);
      network.fit({ animation:true });
    });
    document.getElementById('lockBtn').addEventListener('click', () => {
      physicsOn = !physicsOn;
      network.setOptions({ physics: { enabled: physicsOn } });
    });

    setTimeout(() => network.fit({ animation:false }), 80);
  </script>
</body>
</html>
